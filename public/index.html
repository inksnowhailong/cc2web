<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Claude Phone Bridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { color-scheme: light; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }

        /* —— markdown 正文：行距宽松、层次清晰 —— */
        .md { font-size: 15px; line-height: 1.7; color: #2c2c2c; word-break: break-word; }
        .md > *:first-child { margin-top: 0; }
        .md > *:last-child { margin-bottom: 0; }
        .md p { margin: 0 0 .7em; }
        .md strong { font-weight: 600; color: #1a1a1a; }
        .md em { font-style: italic; }

        /* 行内代码：低饱和底色，和正文区分但不刺眼 */
        .md code { background: #f0eee6; color: #b03a2e; padding: .12em .4em; border-radius: .35em; font-size: .88em; font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace; }

        /* 代码块：深色卡片，移动端看代码更聚焦 */
        .md pre { background: #1e1e2e; color: #e4e4e7; padding: .85em 1em; border-radius: .6em; overflow-x: auto; margin: .7em 0; font-size: 13px; line-height: 1.6; box-shadow: 0 1px 3px rgba(0,0,0,.12); }
        .md pre code { background: none; color: inherit; padding: 0; font-size: inherit; }

        /* 列表：缩进适中，项间留白 */
        .md ul, .md ol { margin: .5em 0 .7em; padding-left: 1.4em; }
        .md li { margin: .25em 0; }
        .md ul { list-style: disc; }
        .md ol { list-style: decimal; }

        /* 标题：克制的字号梯度 */
        .md h1, .md h2, .md h3 { font-weight: 600; line-height: 1.3; margin: .9em 0 .45em; color: #1a1a1a; }
        .md h1 { font-size: 1.3em; }
        .md h2 { font-size: 1.18em; }
        .md h3 { font-size: 1.06em; }

        .md a { color: #2563eb; text-decoration: none; border-bottom: 1px solid rgba(37,99,235,.3); }
        .md blockquote { border-left: 3px solid #d6c9a8; background: #faf8f2; padding: .5em .8em; color: #5c5346; margin: .7em 0; border-radius: 0 .4em .4em 0; }
        .md hr { border: none; border-top: 1px solid #e5e1d8; margin: 1em 0; }

        /* 表格：轻边框，斑马纹 */
        .md table { border-collapse: collapse; margin: .7em 0; font-size: 14px; width: 100%; }
        .md th, .md td { border: 1px solid #e5e1d8; padding: .4em .6em; text-align: left; }
        .md th { background: #f5f2ea; font-weight: 600; }

        /* 滚动条收窄，移动端更干净 */
        #msgs::-webkit-scrollbar { width: 5px; }
        #msgs::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 3px; }
    </style>
</head>
<body class="h-screen overflow-hidden" style="background:#f5f2ea;">

    <!-- 登录视图 -->
    <div data-alt="login-view" id="login" class="h-full flex flex-col items-center justify-center gap-5 px-8">
        <div data-alt="login-logo" class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl" style="background:#d97757;color:#fff;box-shadow:0 4px 14px rgba(217,119,87,.35);">✳</div>
        <div data-alt="login-title" class="text-xl font-semibold" style="color:#2c2c2c;">Claude Phone Bridge</div>
        <input data-alt="token-input" id="token" type="password" placeholder="输入访问 Token"
            class="w-full max-w-xs px-4 py-3 rounded-xl border focus:outline-none focus:ring-2"
            style="border-color:#e0dccf;background:#fff;" />
        <button data-alt="login-button" id="loginBtn"
            class="w-full max-w-xs px-4 py-3 rounded-xl text-white font-medium active:opacity-90 transition"
            style="background:#d97757;box-shadow:0 4px 14px rgba(217,119,87,.3);">登录</button>
        <div data-alt="login-error" id="loginErr" class="text-sm text-red-500 h-5"></div>
    </div>

    <!-- 聊天视图 -->
    <div data-alt="chat-view" id="chat" class="hidden h-full flex flex-col">
        <div data-alt="chat-header" class="px-4 py-3 flex items-center gap-2 shrink-0"
            style="background:rgba(245,242,234,.85);backdrop-filter:blur(8px);border-bottom:1px solid #e8e3d6;">
            <span class="w-2 h-2 rounded-full" style="background:#3fb950;box-shadow:0 0 6px #3fb950;"></span>
            <span class="text-sm font-medium" style="color:#5c5346;">已连接 · 同一会话双端同步</span>
        </div>
        <div data-alt="message-list" id="msgs" class="flex-1 overflow-y-auto px-3 py-4 space-y-3"></div>
        <div data-alt="input-bar" class="p-3 flex gap-2 shrink-0" style="background:#fff;border-top:1px solid #e8e3d6;">
            <input data-alt="message-input" id="text" type="text" placeholder="发消息给 Claude…"
                class="flex-1 px-4 py-2.5 rounded-full border focus:outline-none focus:ring-2"
                style="border-color:#e0dccf;" />
            <button data-alt="send-button" id="sendBtn"
                class="px-5 py-2.5 rounded-full text-white font-medium active:opacity-90 transition"
                style="background:#d97757;">发送</button>
        </div>
    </div>

    <script>
        const $ = (id) => document.getElementById(id);

        let TOKEN = ''; // 登录后保存，后续请求显式携带（不依赖 cookie）

        /** 登录：校验 token，成功则保存并进入聊天 */
        async function login() {
            const token = $('token').value.trim();
            const r = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token }),
            });
            if (r.ok) {
                TOKEN = token;
                localStorage.setItem('c2web_token', token);
                $('login').classList.add('hidden');
                $('chat').classList.remove('hidden');
                connect();
            } else {
                localStorage.removeItem('c2web_token');
                $('loginErr').textContent = 'Token 不对';
            }
        }

        /** 把一条事件渲染进消息列表（按来源区分样式） */
        function addMsg(ev) {
            const list = $('msgs');
            const wrap = document.createElement('div');
            if (ev.kind === 'user') {
                wrap.className = 'flex justify-end';
                wrap.innerHTML = `<div data-alt="msg-user" class="max-w-[82%] px-4 py-2.5 text-white whitespace-pre-wrap break-words text-[15px] leading-relaxed" style="background:#d97757;border-radius:18px 18px 4px 18px;box-shadow:0 1px 3px rgba(217,119,87,.25);">${esc(ev.text)}</div>`;
            } else if (ev.kind === 'assistant') {
                wrap.className = 'flex justify-start';
                const html = window.marked ? marked.parse(ev.text) : esc(ev.text);
                wrap.innerHTML = `<div data-alt="msg-assistant" class="md max-w-[88%] px-4 py-3 break-words" style="background:#fff;border-radius:18px 18px 18px 4px;box-shadow:0 1px 3px rgba(0,0,0,.06);">${html}</div>`;
            } else { // tool：我在干啥
                wrap.className = 'flex justify-start';
                wrap.innerHTML = `<div data-alt="msg-tool" class="inline-flex items-center gap-1 text-xs px-2.5 py-1 rounded-full" style="background:#ece7da;color:#8a7f6b;">🔧 ${esc(ev.text)}</div>`;
            }
            list.appendChild(wrap);
            list.scrollTop = list.scrollHeight;
        }

        /** 转义，防止 transcript 内容破坏 DOM */
        function esc(s) {
            return String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
        }

        /** 启动事件轮询（每秒拉一次增量；普通 JSON 请求，穿透任何代理都不被缓冲） */
        function connect() {
            let cursor = 0;     // 已拉取到的最大事件 id
            let busy = false;   // 防止上一拉未回就重叠发起
            const poll = async () => {
                if (busy) return;
                busy = true;
                try {
                    const r = await fetch('/events?since=' + cursor + '&token=' + encodeURIComponent(TOKEN));
                    if (r.ok) {
                        const { events, last } = await r.json();
                        for (const ev of events) addMsg(ev);
                        cursor = last;
                    }
                } catch { /* 网络抖动，下次再拉 */ } finally { busy = false; }
            };
            poll();
            setInterval(poll, 1000);
        }

        /** 发送指令到会话（token 走 x-token 头；不本地回显，靠 transcript 流统一呈现） */
        async function send() {
            const t = $('text').value.trim();
            if (!t) return;
            $('text').value = '';
            await fetch('/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-token': TOKEN },
                body: JSON.stringify({ text: t }),
            });
        }

        $('loginBtn').onclick = login;
        $('token').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
        $('sendBtn').onclick = send;
        $('text').addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

        // 重访自动登录：localStorage 里有 token 就直接登
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('c2web_token');
            if (saved) { $('token').value = saved; login(); }
        });
    </script>
</body>
</html>
