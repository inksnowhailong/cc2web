<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover 让 env(safe-area-inset-*) 生效，处理刘海屏/底部小白条 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Claude Phone Bridge</title>
    <!-- 全部本地 vendor，零 CDN：移动端/受限网络也能加载 -->
    <link rel="stylesheet" href="/vendor/xterm.css" />
    <script src="/vendor/marked.umd.js"></script>
    <script src="/vendor/xterm.js"></script>
    <script src="/vendor/addon-fit.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; height: 100%; }
        body {
            /* 100dvh：随移动端浏览器工具栏伸缩的真实可视高度，避免底部输入栏被遮 */
            height: 100dvh; min-height: 100dvh; overflow: hidden;
            background: #f5f2ea; color: #2c2c2c;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            -webkit-text-size-adjust: 100%;
        }
        .hidden { display: none !important; }
        button { font-family: inherit; cursor: pointer; border: none; }
        input { font-family: inherit; }

        /* —— 登录 —— */
        #login { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 0 32px; }
        .logo { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 26px; background: #d97757; color: #fff; box-shadow: 0 4px 14px rgba(217,119,87,.35); }
        .title { font-size: 20px; font-weight: 600; }
        #token { width: 100%; max-width: 320px; padding: 12px 16px; border-radius: 12px; border: 1px solid #e0dccf; background: #fff; font-size: 16px; outline: none; }
        #token:focus { border-color: #d97757; }
        #loginBtn { width: 100%; max-width: 320px; padding: 12px 16px; border-radius: 12px; background: #d97757; color: #fff; font-weight: 600; font-size: 16px; box-shadow: 0 4px 14px rgba(217,119,87,.3); }
        #loginBtn:active { opacity: .9; }
        #loginErr { font-size: 14px; color: #ef4444; height: 20px; }

        /* —— 聊天外壳 —— */
        #chat { height: 100%; display: flex; flex-direction: column; }
        .header {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; padding-top: calc(10px + env(safe-area-inset-top));
            background: rgba(245,242,234,.9); backdrop-filter: blur(8px); border-bottom: 1px solid #e8e3d6;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; box-shadow: 0 0 6px #3fb950; flex-shrink: 0; }
        .tabs { display: flex; gap: 4px; padding: 3px; border-radius: 9px; background: #e8e3d6; }
        .tab { padding: 5px 14px; border-radius: 7px; font-size: 14px; font-weight: 500; color: #8a7f6b; background: transparent; }
        .tab.active { background: #fff; color: #2c2c2c; }

        /* —— 对话视图 —— */
        #paneChat { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        #msgs { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 12px; }
        #msgs::-webkit-scrollbar { width: 5px; }
        #msgs::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 3px; }
        .row { display: flex; }
        .row.end { justify-content: flex-end; }
        .row.start { justify-content: flex-start; }
        .b-user { max-width: 82%; padding: 10px 16px; color: #fff; background: #d97757; border-radius: 18px 18px 4px 18px; box-shadow: 0 1px 3px rgba(217,119,87,.25); font-size: 15px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
        .b-asst { max-width: 88%; padding: 12px 16px; background: #fff; border-radius: 18px 18px 18px 4px; box-shadow: 0 1px 3px rgba(0,0,0,.06); word-break: break-word; }
        .b-tool { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; padding: 4px 10px; border-radius: 999px; background: #ece7da; color: #8a7f6b; }
        .input-bar {
            display: flex; gap: 8px; background: #fff; border-top: 1px solid #e8e3d6;
            padding: 12px; padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        #text { flex: 1; padding: 10px 16px; border-radius: 999px; border: 1px solid #e0dccf; font-size: 16px; outline: none; }
        #text:focus { border-color: #d97757; }
        #sendBtn { padding: 10px 20px; border-radius: 999px; background: #d97757; color: #fff; font-weight: 600; font-size: 15px; }
        #sendBtn:active { opacity: .9; }

        /* —— 终端视图 —— */
        #paneTerm { flex: 1; display: flex; flex-direction: column; min-height: 0; background: #1e1e2e; }
        #term { flex: 1; min-height: 0; padding: 4px; }
        #term .xterm, #term .xterm-viewport, #term .xterm-screen { height: 100% !important; }
        .term-keys {
            display: flex; gap: 6px; overflow-x: auto; background: #181825; border-top: 1px solid #313244;
            padding: 8px; padding-bottom: calc(8px + env(safe-area-inset-bottom));
        }
        .termkey { padding: 6px 11px; border-radius: 8px; font-size: 13px; white-space: nowrap; background: #313244; color: #cdd6f4; }
        .termkey:active { background: #45475a; }
        .termkey.refresh { background: #d97757; color: #fff; font-weight: 600; }
        .termkey.refresh:active { background: #c2664a; }

        /* —— markdown 正文 —— */
        .md { font-size: 15px; line-height: 1.7; color: #2c2c2c; }
        .md > *:first-child { margin-top: 0; }
        .md > *:last-child { margin-bottom: 0; }
        .md p { margin: 0 0 .7em; }
        .md strong { font-weight: 600; color: #1a1a1a; }
        .md em { font-style: italic; }
        .md code { background: #f0eee6; color: #b03a2e; padding: .12em .4em; border-radius: .35em; font-size: .88em; font-family: 'SFMono-Regular', Consolas, monospace; }
        .md pre { background: #1e1e2e; color: #e4e4e7; padding: .85em 1em; border-radius: .6em; overflow-x: auto; margin: .7em 0; font-size: 13px; line-height: 1.6; box-shadow: 0 1px 3px rgba(0,0,0,.12); }
        .md pre code { background: none; color: inherit; padding: 0; font-size: inherit; }
        .md ul, .md ol { margin: .5em 0 .7em; padding-left: 1.4em; }
        .md li { margin: .25em 0; }
        .md ul { list-style: disc; } .md ol { list-style: decimal; }
        .md h1, .md h2, .md h3 { font-weight: 600; line-height: 1.3; margin: .9em 0 .45em; color: #1a1a1a; }
        .md h1 { font-size: 1.3em; } .md h2 { font-size: 1.18em; } .md h3 { font-size: 1.06em; }
        .md a { color: #2563eb; text-decoration: none; border-bottom: 1px solid rgba(37,99,235,.3); }
        .md blockquote { border-left: 3px solid #d6c9a8; background: #faf8f2; padding: .5em .8em; color: #5c5346; margin: .7em 0; border-radius: 0 .4em .4em 0; }
        .md hr { border: none; border-top: 1px solid #e5e1d8; margin: 1em 0; }
        .md table { border-collapse: collapse; margin: .7em 0; font-size: 14px; width: 100%; }
        .md th, .md td { border: 1px solid #e5e1d8; padding: .4em .6em; text-align: left; }
        .md th { background: #f5f2ea; font-weight: 600; }
    </style>
</head>
<body>

    <!-- 登录视图 -->
    <div data-alt="login-view" id="login">
        <div data-alt="login-logo" class="logo">✳</div>
        <div data-alt="login-title" class="title">Claude Phone Bridge</div>
        <input data-alt="token-input" id="token" type="password" placeholder="输入访问 Token" />
        <button data-alt="login-button" id="loginBtn">登录</button>
        <div data-alt="login-error" id="loginErr"></div>
    </div>

    <!-- 聊天视图 -->
    <div data-alt="chat-view" id="chat" class="hidden">
        <div data-alt="chat-header" class="header">
            <span class="dot"></span>
            <div data-alt="view-tabs" class="tabs">
                <button data-alt="tab-chat" id="tabChat" class="tab active">对话</button>
                <button data-alt="tab-term" id="tabTerm" class="tab">终端</button>
            </div>
        </div>

        <!-- 对话视图（markdown 阅读 + 发整条指令） -->
        <div data-alt="chat-pane" id="paneChat">
            <div data-alt="message-list" id="msgs"></div>
            <div data-alt="input-bar" class="input-bar">
                <input data-alt="message-input" id="text" type="text" placeholder="发消息给 Claude…" />
                <button data-alt="send-button" id="sendBtn">发送</button>
            </div>
        </div>

        <!-- 终端视图（xterm 镜像，所见即所得，可看选项/推进/中断） -->
        <div data-alt="term-pane" id="paneTerm" class="hidden">
            <div data-alt="terminal" id="term"></div>
            <div data-alt="term-keys" class="term-keys">
                <button class="termkey refresh" id="termRefresh">⟳ 刷新</button>
                <button class="termkey" data-key="esc">Esc 中断</button>
                <button class="termkey" data-key="enter">Enter</button>
                <button class="termkey" data-key="ctrlc">Ctrl+C</button>
                <button class="termkey" data-key="up">↑</button>
                <button class="termkey" data-key="down">↓</button>
                <button class="termkey" data-key="tab">Tab</button>
            </div>
        </div>
    </div>

    <script>
        const $ = (id) => document.getElementById(id);

        let TOKEN = '';        // 登录后保存，后续请求显式携带（不依赖 cookie）
        let ws = null;         // 唯一 WebSocket，承载对话事件 + 终端镜像
        let maxId = 0;         // 已渲染的最大事件 id，断线重连回放时据此去重

        /** 登录：校验 token，成功则保存并进入聊天 */
        async function login() {
            const token = $('token').value.trim();
            const r = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token }),
            });
            if (r.ok) {
                TOKEN = token;
                localStorage.setItem('c2web_token', token);
                $('login').classList.add('hidden');
                $('chat').classList.remove('hidden');
                connect();
            } else {
                localStorage.removeItem('c2web_token');
                $('loginErr').textContent = 'Token 不对';
            }
        }

        /** 把一条事件渲染进消息列表（按来源区分样式） */
        function addMsg(ev) {
            const list = $('msgs');
            const row = document.createElement('div');
            if (ev.kind === 'user') {
                row.className = 'row end';
                row.innerHTML = `<div data-alt="msg-user" class="b-user">${esc(ev.text)}</div>`;
            } else if (ev.kind === 'assistant') {
                row.className = 'row start';
                const html = window.marked ? marked.parse(ev.text) : esc(ev.text);
                row.innerHTML = `<div data-alt="msg-assistant" class="b-asst md">${html}</div>`;
            } else { // tool：我在干啥
                row.className = 'row start';
                row.innerHTML = `<div data-alt="msg-tool" class="b-tool">🔧 ${esc(ev.text)}</div>`;
            }
            list.appendChild(row);
            list.scrollTop = list.scrollHeight;
        }

        /** 转义，防止 transcript 内容破坏 DOM */
        function esc(s) {
            return String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
        }

        /** 建立 WS 连接：对话事件即时推送 + 终端流，断线自动重连 */
        function connect() {
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            ws = new WebSocket(`${proto}://${location.host}/ws?token=${encodeURIComponent(TOKEN)}`);
            ws.onmessage = (e) => {
                let m; try { m = JSON.parse(e.data); } catch { return; }
                if (m.t === 'ev') {                       // 对话事件（去重后渲染）
                    if (m.e.id > maxId) { maxId = m.e.id; addMsg(m.e); }
                } else if (m.t === 'term') {              // 终端实时输出
                    if (term) term.write(m.d);
                } else if (m.t === 'term-replay') {       // attach 回放：先清屏再写，避免叠屏
                    if (term) { term.reset(); term.write(m.d); }
                }
            };
            // 断线重连：重连后若正看着终端，onWsOpen 会重新 attach
            ws.onclose = () => setTimeout(connect, 1500);
            ws.onopen = onWsOpen;
        }

        /** 连接就绪：若当前在终端页则订阅终端流并同步尺寸 */
        function onWsOpen() {
            if (term && !$('paneTerm').classList.contains('hidden')) { wsSend({ t: 'attach' }); sendResize(); }
        }

        /** 发送指令到会话（不本地回显，靠 transcript 流统一呈现） */
        function send() {
            const t = $('text').value.trim();
            if (!t) return;
            $('text').value = '';
            wsSend({ t: 'send', text: t });
        }

        // ============ 终端镜像（xterm，复用上面的 ws） ============
        let term = null;        // xterm 实例（懒初始化）
        let fitAddon = null;    // 自适应容器尺寸
        let termReady = false;  // 是否已初始化过

        /** 常用控制键 → 实际发送给 pty 的字节序列 */
        const KEY_SEQ = {
            esc: '\x1b',        // Esc：Claude 用它中断当前生成
            enter: '\r',
            ctrlc: '\x03',      // Ctrl+C
            up: '\x1b[A',
            down: '\x1b[B',
            tab: '\t',
        };

        /** 懒初始化终端：建 xterm 实例并接到共享 ws（终端流靠 attach 订阅）；只跑一次 */
        function initTerm() {
            if (termReady) return;
            termReady = true;
            term = new Terminal({
                cursorBlink: true,
                fontSize: 13,
                fontFamily: "'SFMono-Regular', Consolas, monospace",
                theme: { background: '#1e1e2e', foreground: '#cdd6f4' },
            });
            fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            term.open($('term'));
            fitAddon.fit();
            term.onData((d) => wsSend({ t: 'i', d }));                         // 键盘 → pty

            // 容器尺寸变化（旋屏/切到此页）→ 重新 fit 并把新尺寸同步给 pty
            window.addEventListener('resize', () => { if (!$('paneTerm').classList.contains('hidden')) { fitAddon.fit(); sendResize(); } });
        }

        /** 安全发送：ws 未就绪则忽略 */
        function wsSend(obj) { try { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); } catch {} }

        /** 把当前终端行列数同步给 pty，保证 TUI 不错位 */
        function sendResize() { if (term) wsSend({ t: 'r', c: term.cols, r: term.rows }); }

        /**
         * 主动刷新终端：清屏 + 重订阅 + 抖动一次尺寸逼 TUI 全量重绘。
         * 用于偶发的「刷新空白」——靠 resize 触发 Ink 重画当前界面，拿到一帧权威完整画面，
         * 不再依赖可能被截断的原始字节缓冲。
         */
        function refreshTerm() {
            if (!term || !fitAddon) return;
            term.reset();
            fitAddon.fit();
            const cols = term.cols, rows = term.rows;
            wsSend({ t: 'attach' });                                      // 重订阅 + 回放当前屏
            wsSend({ t: 'r', c: cols, r: Math.max(2, rows - 1) });        // 改尺寸 → 触发 TUI 重绘
            setTimeout(() => wsSend({ t: 'r', c: cols, r: rows }), 120);  // 恢复 → 得到完整当前画面
            term.focus();
        }

        /** 切换视图：对话 / 终端 */
        function switchView(toTerm) {
            $('paneChat').classList.toggle('hidden', toTerm);
            $('paneTerm').classList.toggle('hidden', !toTerm);
            $('tabChat').classList.toggle('active', !toTerm);
            $('tabTerm').classList.toggle('active', toTerm);
            if (toTerm) {
                initTerm();
                wsSend({ t: 'attach' }); // 订阅终端流，服务端回放当前屏
                setTimeout(() => { if (fitAddon) { fitAddon.fit(); sendResize(); term.focus(); } }, 50);
            } else {
                wsSend({ t: 'detach' }); // 退订，终端啰嗦，不看时省流量
            }
        }

        $('loginBtn').onclick = login;
        $('token').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
        $('sendBtn').onclick = send;
        $('text').addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
        $('tabChat').onclick = () => switchView(false);
        $('tabTerm').onclick = () => switchView(true);
        document.querySelectorAll('.termkey').forEach(btn => {
            btn.onclick = () => { const seq = KEY_SEQ[btn.dataset.key]; if (seq != null) wsSend({ t: 'i', d: seq }); };
        });
        $('termRefresh').onclick = refreshTerm; // 覆盖上面循环里给它设的空 onclick

        // 重访自动登录：localStorage 里有 token 就直接登
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('c2web_token');
            if (saved) { $('token').value = saved; login(); }
        });
    </script>
</body>
</html>
